<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nike World - Cập Nhật Thiết Kế</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">NIKEWORLD</div>
        <nav>
            <a href="#">Trang Chủ</a>
            <a href="#">Sản Phẩm</a>
            <a href="#">Giỏ Hàng</a>
            <a href="#">Trợ Giúp</a>
            <i class="fas fa-bars menu-icon"></i>
        </nav>
    </header>

    <section class="hero">
        <div class="blurred-background"></div>

        <div class="hero-content">
            <div class="left-content">
                <h1>BEST<br>SELLER</h1>
                <p>Người đồng hành cùng bạn trên suốt quãng đường dài</p>
                <button>Mua Ngay</button>
            </div>
            <div class="right-content">
                <img src="shoe.webp" alt="Nike Blue Shoe">
            </div>
        </div>

        <div class="footer-contact">
            <div class="contact-info">
                <span>0336009900</span><br>
                <span>support@nike.com</span>
            </div>
            <div class="social-logos">
                <a href="#" class="facebook-link"><span class="facebook-logo-sq">f</span></a>
                <a href="#" class="instagram-link"><span class="instagram-logo-cir"><i class="fab fa-instagram"></i></span></a>
                <a href="#" class="tiktok-link"><span class="tiktok-logo-cir"><i class="fab fa-tiktok"></i></span></a>
            </div>
        </div>
    </section>
</body>
</html>
